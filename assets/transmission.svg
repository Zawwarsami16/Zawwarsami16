<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="44" viewBox="0 0 900 44">
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="6%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="94%" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="900" height="44" fill="#0a0a0a"/>

  <!-- label badge -->
  <rect x="0" y="6" width="160" height="32" fill="#ff003c"/>
  <text x="80" y="27" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle" letter-spacing="3">▎TRANSMISSION</text>

  <!-- marquee region -->
  <g clip-path="inset(0 0 0 170)">
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#e8e8e8">
      <g>
        <animateTransform attributeName="transform" type="translate" from="900 0" to="-2400 0" dur="38s" repeatCount="indefinite"/>
        <text x="0" y="28">
          <tspan fill="#ff003c">●</tspan> the patterns folder grows faster than the writeups one. on purpose.
          <tspan fill="#ff003c" dx="40">●</tspan> most of the code I run, you cannot see.
          <tspan fill="#ff003c" dx="40">●</tspan> anteroom studio. ZAI inside.
          <tspan fill="#ff003c" dx="40">●</tspan> compress a research desk into one operator.
          <tspan fill="#ff003c" dx="40">●</tspan> real shell, fake stakes.
          <tspan fill="#ff003c" dx="40">●</tspan> three commands, one URL plus key, reachable anywhere.
          <tspan fill="#ff003c" dx="40">●</tspan> not open to work — building.
        </text>
      </g>
    </g>
  </g>

  <!-- fade edges -->
  <rect width="900" height="44" fill="url(#fade)" pointer-events="none"/>

  <!-- bottom red rule -->
  <line x1="170" y1="40" x2="900" y2="40" stroke="#ff003c" stroke-width="0.6" opacity="0.4"/>
</svg>
