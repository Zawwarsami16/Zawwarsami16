<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff003c" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff003c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff003c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff003c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="#0a0a0a"/>
  <rect width="900" height="240" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <g stroke="#ff003c" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 16 16 L 16 36 M 16 16 L 36 16"/>
    <path d="M 884 16 L 884 36 M 884 16 L 864 16"/>
    <path d="M 16 224 L 16 204 M 16 224 L 36 224"/>
    <path d="M 884 224 L 884 204 M 884 224 L 864 224"/>
  </g>

  <!-- Status row top -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#ff003c" opacity="0.8">
    <circle cx="46" cy="28" r="3.5" fill="#ff003c">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="58" y="32" letter-spacing="2">PROCESS RUNNING</text>
    <text x="780" y="32" letter-spacing="2" text-anchor="end">UTC 2026</text>
  </g>

  <!-- Animated horizontal sweep behind the name -->
  <rect x="-200" y="86" width="200" height="80" fill="url(#scanGrad)" opacity="0.6" transform="rotate(0)">
    <animate attributeName="x" from="-200" to="900" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Name -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">
    <text x="450" y="135" font-size="62" font-weight="700" fill="#ff003c" filter="url(#bigglow)" letter-spacing="14">
      ZAWWAR · SAMI
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="800" y="98" width="12" height="46" fill="#ff003c" filter="url(#glow)">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="450" y="166" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#888" text-anchor="middle" letter-spacing="6">
    INDEPENDENT  ·  CANADA  ·  ANTEROOM STUDIO
  </text>

  <!-- EKG / pulse line drawing in -->
  <path d="M 0 200 L 120 200 L 138 184 L 156 216 L 174 200 L 320 200 L 338 172 L 356 228 L 374 200 L 540 200 L 558 188 L 576 212 L 594 200 L 770 200 L 788 178 L 806 222 L 824 200 L 900 200"
        fill="none" stroke="#ff003c" stroke-width="1.6" opacity="0.85" filter="url(#glow)"
        stroke-dasharray="1200" stroke-dashoffset="1200">
    <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="2.6s" begin="0s" fill="freeze"/>
    <animate attributeName="opacity" values="0.85;0.55;0.85" dur="2.4s" begin="2.6s" repeatCount="indefinite"/>
  </path>

  <!-- Vertical scanline moving down -->
  <line x1="0" y1="-2" x2="900" y2="-2" stroke="#ff003c" stroke-width="1.2" opacity="0.45">
    <animate attributeName="y1" from="-2" to="242" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="y2" from="-2" to="242" dur="3.6s" repeatCount="indefinite"/>
  </line>

  <!-- Top/bottom darkening -->
  <rect width="900" height="240" fill="url(#vignette)"/>
</svg>
