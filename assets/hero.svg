<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff003c" stroke-width="0.4" opacity="0.10"/>
    </pattern>
    <linearGradient id="topfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="900" height="340" fill="#0a0a0a"/>
  <rect width="900" height="340" fill="url(#grid)"/>
  <rect width="900" height="60" fill="url(#topfade)"/>
  <rect y="280" width="900" height="60" fill="url(#botfade)"/>

  <!-- corner brackets -->
  <g stroke="#ff003c" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 14 14 L 14 36 M 14 14 L 36 14"/>
    <path d="M 886 14 L 886 36 M 886 14 L 864 14"/>
    <path d="M 14 326 L 14 304 M 14 326 L 36 326"/>
    <path d="M 886 326 L 886 304 M 886 326 L 864 326"/>
  </g>

  <!-- top status bar -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="2">
    <circle cx="48" cy="32" r="3.5" fill="#ff003c">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="36" fill="#ff003c" opacity="0.9">anteroom://main</text>
    <text x="450" y="36" fill="#666" text-anchor="middle">— SECURE CHANNEL —</text>
    <text x="852" y="36" fill="#ff003c" opacity="0.9" text-anchor="end"><!--CLOCK-->00:09 UTC<!--/CLOCK--></text>
  </g>

  <!-- horizontal divider under status -->
  <line x1="40" y1="56" x2="860" y2="56" stroke="#ff003c" stroke-width="0.6" opacity="0.4"/>

  <!-- terminal session -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15">

    <!-- line 1: prompt + ssh command  -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
      <text x="40" y="92" fill="#ff003c" font-weight="700">$</text>
      <text x="60" y="92" fill="#e8e8e8">ssh zawwar@anteroom</text>
    </g>

    <!-- response line -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
      <text x="40" y="116" fill="#888"><!--LASTLOGIN-->Last login: Sat Jun 13 2026 00:09:59 from cloudflare<!--/LASTLOGIN--></text>
    </g>

    <!-- line 2: prompt + whoami  -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
      <text x="40" y="148" fill="#ff003c" font-weight="700">$</text>
      <text x="60" y="148" fill="#e8e8e8">whoami --verbose</text>
    </g>

    <!-- whoami response, glowing name -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.4s" fill="freeze"/>
      <text x="60" y="172" fill="#ff003c" font-weight="700" filter="url(#bigglow)" font-size="17">Zawwar Sami</text>
      <text x="172" y="172" fill="#888">· independent engineer · canada</text>
    </g>

    <!-- line 3: prompt + status -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
      <text x="40" y="204" fill="#ff003c" font-weight="700">$</text>
      <text x="60" y="204" fill="#e8e8e8">ps --running</text>
    </g>

    <!-- process list rows -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.3s" fill="freeze"/>
      <text x="60" y="226" fill="#888">anteroom-oracle</text>
      <circle cx="222" cy="221" r="3" fill="#ff003c" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="236" y="226" fill="#ff003c">building</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
      <text x="60" y="246" fill="#888">zai</text>
      <circle cx="222" cy="241" r="3" fill="#ff003c" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <text x="236" y="246" fill="#ff003c">running</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.3s" fill="freeze"/>
      <text x="60" y="266" fill="#888">htb-rank</text>
      <circle cx="222" cy="261" r="3" fill="#ff003c" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <text x="236" y="266" fill="#ff003c">climbing</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
      <text x="60" y="286" fill="#888">unwrapping-what-exists</text>
      <circle cx="222" cy="281" r="3" fill="#444">
      </circle>
      <text x="236" y="286" fill="#666">draft 3</text>
    </g>

    <!-- final prompt with blinking cursor -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.3s" fill="freeze"/>
      <text x="40" y="316" fill="#ff003c" font-weight="700">$</text>
      <rect x="62" y="304" width="9" height="16" fill="#ff003c">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" begin="4.3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- vertical scanline -->
  <line x1="0" x2="900" y1="-2" y2="-2" stroke="#ff003c" stroke-width="1" opacity="0.25">
    <animate attributeName="y1" from="-2" to="342" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="y2" from="-2" to="342" dur="5s" repeatCount="indefinite"/>
  </line>
</svg>
