<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="140" viewBox="0 0 900 140">
  <foreignObject x="0" y="0" width="900" height="140">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      width: 900px; height: 140px; background: #0a0a0a; position: relative; overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #ff003c;
      box-sizing: border-box;
    ">
      <style xmlns="http://www.w3.org/1999/xhtml">
        @keyframes glitch-shift {
          0%, 92%, 100% { transform: translate(0); text-shadow: 0 0 0 transparent; }
          93% { transform: translate(-2px, 0); text-shadow: 2px 0 0 #00fff7, -2px 0 0 #ff003c; }
          94% { transform: translate(2px, 0); text-shadow: -2px 0 0 #00fff7, 2px 0 0 #ff003c; }
          95% { transform: translate(0, 1px); text-shadow: 0 0 6px #ff003c; }
          96% { transform: translate(-1px, -1px); text-shadow: 3px 0 0 #00fff7, -3px 0 0 #ff003c; }
        }
        @keyframes scan {
          0% { transform: translateY(-100%); }
          100% { transform: translateY(140px); }
        }
        @keyframes flicker {
          0%, 96%, 100% { opacity: 1; }
          97% { opacity: 0.4; }
          98% { opacity: 0.85; }
        }
        @keyframes cursor-blink {
          0%, 49% { opacity: 1; }
          50%, 100% { opacity: 0; }
        }
        .gl-stage {
          width: 100%; height: 100%; position: relative;
          display: flex; flex-direction: column; justify-content: center; align-items: center;
          gap: 6px;
          animation: flicker 5s infinite;
        }
        .gl-name {
          font-size: 48px; font-weight: 700; letter-spacing: 14px;
          animation: glitch-shift 6s infinite;
          text-shadow: 0 0 12px rgba(255, 0, 60, 0.4);
        }
        .gl-line {
          font-size: 11px; letter-spacing: 4px; color: #999;
        }
        .gl-cursor {
          display: inline-block; width: 9px; height: 14px; background: #ff003c;
          margin-left: 4px; vertical-align: -2px;
          animation: cursor-blink 1s infinite;
        }
        .gl-scan {
          position: absolute; left: 0; right: 0; top: 0; height: 32px;
          background: linear-gradient(180deg, transparent 0%, rgba(255, 0, 60, 0.18) 50%, transparent 100%);
          animation: scan 4.5s linear infinite;
          pointer-events: none;
        }
        .gl-vignette {
          position: absolute; inset: 0;
          background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.55) 100%);
          pointer-events: none;
        }
        .gl-grid {
          position: absolute; inset: 0;
          background-image:
            linear-gradient(rgba(255,0,60,0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,0,60,0.08) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }
      </style>
      <div class="gl-grid"></div>
      <div class="gl-scan"></div>
      <div class="gl-stage">
        <div class="gl-line">▎ TRANSMISSION ANTEROOM ──────────────────────────────── EOF</div>
        <div class="gl-name">ZAWWAR · SAMI<span class="gl-cursor"></span></div>
        <div class="gl-line">INDEPENDENT  ·  CANADA  ·  ANTEROOM STUDIO</div>
      </div>
      <div class="gl-vignette"></div>
    </div>
  </foreignObject>
</svg>
