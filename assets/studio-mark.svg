<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="56" viewBox="0 0 900 56">
  <defs>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff003c" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ff003c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff003c" stop-opacity="0"/>
    </linearGradient>
    <filter id="sg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <rect width="900" height="56" fill="#0a0a0a"/>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <!-- left mark -->
    <rect x="0" y="0" width="6" height="56" fill="#ff003c"/>
    <circle cx="32" cy="28" r="3.5" fill="#ff003c" filter="url(#sg)">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- studio attribution -->
    <text x="50" y="24" font-size="11" font-weight="700" fill="#ff003c" letter-spacing="4">ZAWWAR · SAMI</text>
    <text x="50" y="40" font-size="9" fill="#888" letter-spacing="3">PART OF THE ANTEROOM STUDIO SURFACE</text>

    <!-- right side: link cue -->
    <text x="868" y="24" font-size="9" fill="#888" letter-spacing="2" text-anchor="end">github.com/Zawwarsami16</text>
    <text x="868" y="40" font-size="9" fill="#ff003c" letter-spacing="2" text-anchor="end" font-weight="700">↗ PROFILE</text>

    <!-- horizontal rule -->
    <line x1="14" y1="50" x2="868" y2="50" stroke="url(#rule)" stroke-width="0.8"/>
  </g>
</svg>
